<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .glass-effect {
            backdrop-filter: blur(40px);
            background: rgba(19, 19, 21, 0.85);
        }
        .progress-ring-circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface font-body overflow-hidden">
<!-- Blurred Background Context (Dashboard Simulation) -->
<div class="fixed inset-0 z-0 p-6 filter blur-md opacity-40">
<header class="flex justify-between items-center mb-8">
<div class="h-8 w-32 bg-surface-container rounded-lg"></div>
<div class="h-10 w-10 bg-surface-container rounded-full"></div>
</header>
<div class="grid grid-cols-2 gap-4 mb-8">
<div class="h-32 bg-surface-container-low rounded-xl"></div>
<div class="h-32 bg-surface-container-low rounded-xl"></div>
</div>
<div class="h-64 bg-surface-container-low rounded-xl mb-4"></div>
<div class="h-20 bg-surface-container-low rounded-xl"></div>
</div>
<!-- Modal Overlay Backdrop -->
<div class="fixed inset-0 bg-black/60 z-10 backdrop-blur-sm"></div>
<!-- Bottom Slide-Up Modal -->
<main class="fixed bottom-0 left-0 right-0 z-20 flex flex-col items-center">
<!-- Drag Handle Indicator -->
<div class="w-12 h-1.5 bg-outline-variant/30 rounded-full mb-3"></div>
<!-- Modal Content Container -->
<section class="w-full max-w-lg bg-[#111114] rounded-t-[2.5rem] p-8 pb-12 shadow-2xl border-t border-outline-variant/10">
<!-- Modal Header / Title (Derived from JSON Hierarchy) -->
<div class="flex justify-between items-center mb-8">
<span class="text-xs font-bold tracking-[0.2em] text-outline uppercase">Session Active</span>
<button class="p-2 bg-surface-container-high rounded-full hover:bg-surface-variant transition-colors active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
</div>
<!-- Mode Selector (Top) -->
<nav class="flex justify-center gap-2 mb-12 p-1.5 bg-surface-container-lowest rounded-2xl w-fit mx-auto">
<button class="px-5 py-2.5 rounded-xl text-sm font-semibold transition-all duration-200 bg-primary text-on-primary shadow-[0_0_20px_rgba(99,102,241,0.3)]">
                    Work (25m)
                </button>
<button class="px-5 py-2.5 rounded-xl text-sm font-medium text-on-surface-variant hover:text-on-surface transition-colors">
                    Short Break (5m)
                </button>
<button class="px-5 py-2.5 rounded-xl text-sm font-medium text-on-surface-variant hover:text-on-surface transition-colors">
                    Long Break (15m)
                </button>
</nav>
<!-- Circular Progress Ring (Center) -->
<div class="relative flex flex-col items-center justify-center mb-12">
<svg class="w-[240px] h-[240px]">
<!-- Background Track -->
<circle cx="120" cy="120" fill="transparent" r="110" stroke="rgba(255,255,255,0.06)" stroke-width="6"></circle>
<!-- Progress Arc -->
<circle class="progress-ring-circle" cx="120" cy="120" fill="transparent" r="110" stroke="#6366f1" stroke-dasharray="691" stroke-dashoffset="172" stroke-linecap="round" stroke-width="6"></circle>
</svg>
<!-- Timer Labels -->
<div class="absolute inset-0 flex flex-col items-center justify-center">
<h1 class="font-headline text-5xl font-extrabold tracking-tighter text-on-surface leading-none mb-2">25:00</h1>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-primary text-[14px]" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="text-[11px] font-bold uppercase tracking-widest text-outline">4 sessions today</span>
</div>
</div>
<!-- Subtle Glow effect -->
<div class="absolute w-48 h-48 bg-primary/10 blur-[60px] rounded-full -z-10"></div>
</div>
<!-- Controls (Bottom) -->
<div class="flex flex-col gap-4 w-full max-w-xs mx-auto">
<button class="w-full py-4 rounded-xl bg-gradient-to-br from-primary to-primary-container text-on-primary-container font-headline font-bold text-lg shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">pause</span>
                    Pause
                </button>
<button class="w-full py-4 rounded-xl border border-outline-variant/30 text-on-surface font-headline font-semibold hover:bg-surface-container-high active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-outline">refresh</span>
                    Reset
                </button>
</div>
<!-- Background Aesthetic (The "Digital Architect" touch) -->
<div class="mt-12 text-center">
<p class="text-[10px] text-outline/40 font-mono tracking-widest">PROTOCOL_V.4.0_READY</p>
</div>
</section>
</main>
<!-- Bottom Navigation (Suppressed per task logic for modal but visually hinted if needed) -->
<!-- The modal is the primary focus, so global nav is visually secondary behind blur -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 py-3 pb-safe z-0 opacity-20 pointer-events-none">
<div class="flex flex-col items-center justify-center text-indigo-400 bg-indigo-500/10 rounded-xl px-3 py-1">

</div>

<span class="font-plus-jakarta-sans text-[10px] font-bold uppercase tracking-widest">Stats</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-500">
<span class="material-symbols-outlined">auto_awesome_motion</span>
<span class="font-plus-jakarta-sans text-[10px] font-bold uppercase tracking-widest">Flow</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-500">
<span class="material-symbols-outlined">inventory_2</span>
<span class="font-plus-jakarta-sans text-[10px] font-bold uppercase tracking-widest">Vault</span>
</div>
</nav>
